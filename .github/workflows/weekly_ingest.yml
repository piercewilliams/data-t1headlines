name: Weekly Site Refresh

on:
  schedule:
    - cron: '0 17 * * 2'  # Noon CDT Tuesday (17:00 UTC); Tarrow's sheet updates Tuesday morning
                           # Adjust to '0 18 * * 2' in winter (CST). Verify with Tarrow if timing shifts.
  workflow_dispatch:        # manual trigger via GitHub UI or API

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            pandas numpy scipy plotly openpyxl xlrd \
            statsmodels scikit-learn pingouin \
            google-auth requests pytest \
            snowflake-connector-python cryptography

      - name: Syntax check and smoke tests
        # Runs under Python 3.11 (the CI version) — catches f-string compatibility
        # issues (backslash-in-expression, same-quote nesting) that Python 3.14+
        # permits locally but 3.11 rejects. Fails fast before the slow data download.
        run: |
          python3 -m py_compile generate_site.py download_tarrow.py update_snapshots.py ingest.py snowflake_enrich.py
          python3 -m pytest tests/ -v

      - name: Write service account credentials
        env:
          SA_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SA_JSON_B64" | base64 -d > /tmp/sa.json

      - name: Write Snowflake RSA key
        env:
          SNOWFLAKE_RSA_KEY_B64: ${{ secrets.SNOWFLAKE_RSA_KEY_B64 }}
        run: echo "$SNOWFLAKE_RSA_KEY_B64" | base64 -d > /tmp/sf_rsa.p8

      - name: Download 2026 sheet from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_FILE: /tmp/sa.json
        run: python3 download_tarrow.py

      - name: Check if data changed
        id: data_check
        run: |
          # Compare new download against last committed version (if it exists)
          if git show HEAD:"Top Stories 2026 Syndication.xlsx" > /tmp/prev.xlsx 2>/dev/null; then
            if cmp -s "Top Stories 2026 Syndication.xlsx" /tmp/prev.xlsx; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Data unchanged — skipping site regeneration."
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Data changed — regenerating site."
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous version found — treating as changed."
          fi

      - name: Enrich with Snowflake O&O data
        if: steps.data_check.outputs.changed == 'true'
        env:
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/sf_rsa.p8
        run: python3 snowflake_enrich.py

      - name: Regenerate site
        if: steps.data_check.outputs.changed == 'true'
        run: python3 generate_site.py --skip-main-archive

      - name: Update longitudinal snapshots
        if: steps.data_check.outputs.changed == 'true'
        run: python3 update_snapshots.py

      - name: Commit and push if changed
        if: steps.data_check.outputs.changed == 'true'
        run: |
          git config user.name "Weekly Ingest"
          git config user.email "actions@github.com"
          # Commit the updated xlsx so next week's change-detection compares against the
          # current version, not a stale HEAD. Without this, 'changed=true' would fire
          # every week regardless of whether Tarrow actually updated the sheet.
          git add "Top Stories 2026 Syndication.xlsx" docs/ data/build_summary.json data/weekly_snapshots.json data/snowflake_enrichment.json data/tracker_gaps.json
          git diff --cached --quiet && echo "Nothing to commit" || (
            git commit -m "Auto: Weekly refresh $(date '+%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          )

      - name: Summary — success (data changed)
        if: success() && steps.data_check.outputs.changed == 'true'
        run: |
          echo "## ✅ Tuesday Site Refresh — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tarrow data changed and was processed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tracker gap report" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          gaps_file = Path("data/tracker_gaps.json")
          if not gaps_file.exists():
              print("tracker_gaps.json not found.")
          else:
              d = json.loads(gaps_file.read_text())
              gaps = d.get("gaps", [])
              count = d.get("gap_count", 0)
              with open(summary, "a") as f:
                  if count == 0:
                      f.write("✅ No untracked articles — Tarrow and Sara's tracker are fully reconciled.\n")
                  else:
                      f.write(f"⚠️ **{count} article(s) in Tarrow not found in Sara's tracker** — review and forward to Sara.\n\n")
                      f.write("| Platform | Views | Author | Headline |\n")
                      f.write("|----------|-------|--------|----------|\n")
                      for g in gaps[:20]:
                          views = f"{g['platform_views']:,}" if g.get('platform_views') else "?"
                          author = g.get('author') or '—'
                          headline = (g.get('headline') or '')[:60]
                          platform = g.get('platform', '')
                          f.write(f"| {platform} | {views} | {author} | {headline} |\n")
                      if count > 20:
                          f.write(f"\n_...and {count - 20} more. See `data/tracker_gaps.json` for full list._\n")
                      f.write(f"\n**Action:** Send unrecognised articles to Sara Vallone for tracker logging.\n")
          PYEOF

      - name: Summary — no change
        if: success() && steps.data_check.outputs.changed == 'false'
        run: |
          echo "## ℹ️ Tuesday Site Refresh — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tarrow's sheet was unchanged since last week. Site not regenerated." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If this is unexpected, verify that Tarrow has updated his sheet and re-run manually." >> $GITHUB_STEP_SUMMARY

      - name: Summary — failure
        if: failure()
        run: |
          echo "## ❌ Tuesday Site Refresh FAILED — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** Check the failed step above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Until fixed: data-headlines site and tracker_gaps.json are stale for this week." >> $GITHUB_STEP_SUMMARY
          echo "Re-run via: Actions → Weekly Site Refresh → Run workflow." >> $GITHUB_STEP_SUMMARY
